<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MinhMakeConfig - Key Active</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>MINHMAKECONFIG</h1>

<div class="card">
<h3>IP hiện tại</h3>
<p id="ip">Đang tải...</p>
</div>

<div class="card">

<input
id="key"
type="text"
placeholder="Nhập KEY">

<button onclick="activeKey()">
ACTIVE KEY
</button>

</div>

<div class="card">

<h3>Thông tin</h3>

<p><b>Trạng thái:</b> <span id="status">Chưa kích hoạt</span></p>

<p><b>Loại key:</b> <span id="type">---</span></p>

<p><b>Ngày kích hoạt:</b> <span id="active">---</span></p>

<p><b>Ngày hết hạn:</b> <span id="expire">---</span></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
